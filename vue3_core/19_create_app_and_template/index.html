<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>19 Create App And Template</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 40px auto;
        padding: 0 16px;
      }

      .card {
        border: 1px solid #d7dfe8;
        padding: 20px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { createApp } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

      createApp({
        data() {
          return {
            title: "PFVue Vue 3 Core",
            message: "This is your first Vue 3 template page.",
            topics: ["template syntax", "interpolation", "directives"],
          };
        },
        template: `
          <section class="card">
            <h1>{{ title }}</h1>
            <p>{{ message }}</p>
            <ul>
              <li v-for="topic in topics" :key="topic">{{ topic }}</li>
            </ul>
            <p v-if="topics.length > 0">You have topics to practice.</p>
          </section>
        `,
      }).mount("#app");
    </script>
  </body>
</html>
