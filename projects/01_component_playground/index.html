<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01 Component Playground</title>
    <style>
      :root {
        --bg: #f7f4ed;
        --panel: #fffdf8;
        --line: #dfd5c2;
        --text: #1f2933;
        --muted: #6b7280;
        --accent: #c06c2b;
        --accent-soft: #f6e7d6;
        --success: #1f7a4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fef7ea, transparent 28%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
        margin-bottom: 24px;
      }

      .hero-card,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(31, 41, 51, 0.05);
      }

      .eyebrow {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0 0 12px;
        font-weight: 600;
      }

      .hero-card p,
      .panel p {
        color: var(--muted);
        line-height: 1.6;
      }

      .hero-stats {
        display: grid;
        gap: 12px;
      }

      .stat {
        padding: 14px;
        border-radius: 14px;
        background: #fff7ea;
        border: 1px solid #ead8b8;
      }

      .workspace {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
      }

      .tab-list,
      .filter-list {
        display: grid;
        gap: 10px;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--line);
        background: white;
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        transition: transform 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        background: #fffcf4;
      }

      button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 18px;
      }

      .toolbar input,
      .toolbar select,
      .form-grid input,
      .form-grid select,
      .form-grid textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: white;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .lesson-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        background: white;
      }

      .lesson-card.done {
        border-color: #b7d8c3;
        background: #f4fbf6;
      }

      .badge {
        display: inline-block;
        margin-bottom: 10px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: #f4eee1;
        color: #75522d;
      }

      .badge.done {
        background: #dff4e7;
        color: var(--success);
      }

      .lesson-actions,
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .preview {
        margin-top: 18px;
        padding: 16px;
        border-radius: 14px;
        background: #fcf8f0;
        border: 1px solid #ebdeca;
      }

      .empty-state {
        padding: 18px;
        border: 1px dashed var(--line);
        border-radius: 14px;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .hero,
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import {
        computed,
        createApp,
        reactive,
        ref,
      } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

      const lessonSeed = [
        { id: 1, title: "Build a filter bar", category: "UI", level: "beginner", done: false },
        { id: 2, title: "Design a reusable card", category: "Component", level: "beginner", done: true },
        { id: 3, title: "Model page state", category: "State", level: "intermediate", done: false },
        { id: 4, title: "Preview a form flow", category: "Form", level: "intermediate", done: false },
      ];

      const LessonCard = {
        props: {
          lesson: {
            type: Object,
            required: true,
          },
        },
        emits: ["toggle"],
        template: `
          <article class="lesson-card" :class="{ done: lesson.done }">
            <span class="badge" :class="{ done: lesson.done }">
              {{ lesson.done ? "Completed" : lesson.level }}
            </span>
            <h3>{{ lesson.title }}</h3>
            <p>{{ lesson.category }} practice with page-level structure in mind.</p>
            <div class="lesson-actions">
              <button @click="$emit('toggle', lesson.id)">
                {{ lesson.done ? "Mark Active" : "Mark Done" }}
              </button>
            </div>
          </article>
        `,
      };

      const FilterPanel = {
        props: {
          activeCategory: String,
          categories: Array,
        },
        emits: ["change-category"],
        template: `
          <section class="panel">
            <h2>Component Modes</h2>
            <div class="filter-list">
              <button
                :class="{ active: activeCategory === 'All' }"
                @click="$emit('change-category', 'All')"
              >
                All
              </button>
              <button
                v-for="category in categories"
                :key="category"
                :class="{ active: activeCategory === category }"
                @click="$emit('change-category', category)"
              >
                {{ category }}
              </button>
            </div>
          </section>
        `,
      };

      createApp({
        components: {
          LessonCard,
          FilterPanel,
        },
        setup() {
          const currentTab = ref("lesson-library");
          const selectedCategory = ref("All");
          const levelFilter = ref("all");
          const keyword = ref("");
          const lessons = ref(structuredClone(lessonSeed));

          const form = reactive({
            title: "",
            category: "UI",
            level: "beginner",
            notes: "",
          });

          const tabs = [
            { id: "lesson-library", label: "Lesson Library" },
            { id: "state-preview", label: "State Preview" },
            { id: "form-studio", label: "Form Studio" },
          ];

          const categories = computed(() => {
            return [...new Set(lessons.value.map((lesson) => lesson.category))];
          });

          const filteredLessons = computed(() => {
            return lessons.value.filter((lesson) => {
              const matchesCategory =
                selectedCategory.value === "All" || lesson.category === selectedCategory.value;
              const matchesLevel =
                levelFilter.value === "all" || lesson.level === levelFilter.value;
              const matchesKeyword =
                lesson.title.toLowerCase().includes(keyword.value.trim().toLowerCase());

              return matchesCategory && matchesLevel && matchesKeyword;
            });
          });

          const completedCount = computed(() => {
            return lessons.value.filter((lesson) => lesson.done).length;
          });

          const completionRate = computed(() => {
            return `${Math.round((completedCount.value / lessons.value.length) * 100)}%`;
          });

          const livePreview = computed(() => {
            return {
              title: form.title || "Untitled component idea",
              category: form.category,
              level: form.level,
              notes: form.notes || "Add the interaction and edge cases you want to practice.",
            };
          });

          function toggleLesson(id) {
            const lesson = lessons.value.find((item) => item.id === id);
            if (lesson) {
              lesson.done = !lesson.done;
            }
          }

          function addDraftLesson() {
            const title = form.title.trim();
            if (!title) {
              return;
            }

            lessons.value.unshift({
              id: Date.now(),
              title,
              category: form.category,
              level: form.level,
              done: false,
            });

            currentTab.value = "lesson-library";
            form.title = "";
            form.category = "UI";
            form.level = "beginner";
            form.notes = "";
          }

          function resetFilters() {
            selectedCategory.value = "All";
            levelFilter.value = "all";
            keyword.value = "";
          }

          return {
            tabs,
            currentTab,
            selectedCategory,
            levelFilter,
            keyword,
            lessons,
            categories,
            filteredLessons,
            completedCount,
            completionRate,
            form,
            livePreview,
            toggleLesson,
            addDraftLesson,
            resetFilters,
          };
        },
        template: `
          <div class="shell">
            <section class="hero">
              <div class="hero-card">
                <span class="eyebrow">Project 01</span>
                <h1>Component Playground</h1>
                <p>
                  Practice component thinking with a small, page-shaped Vue 3 project:
                  filters, state toggles, live form preview, and reusable cards.
                </p>
              </div>

              <div class="hero-stats">
                <div class="stat">
                  <strong>{{ lessons.length }}</strong>
                  <p>playground items</p>
                </div>
                <div class="stat">
                  <strong>{{ completedCount }}</strong>
                  <p>completed lessons</p>
                </div>
                <div class="stat">
                  <strong>{{ completionRate }}</strong>
                  <p>completion rate</p>
                </div>
              </div>
            </section>

            <section class="workspace">
              <aside>
                <section class="panel">
                  <h2>Workspace Tabs</h2>
                  <div class="tab-list">
                    <button
                      v-for="tab in tabs"
                      :key="tab.id"
                      :class="{ active: currentTab === tab.id }"
                      @click="currentTab = tab.id"
                    >
                      {{ tab.label }}
                    </button>
                  </div>
                </section>

                <filter-panel
                  :active-category="selectedCategory"
                  :categories="categories"
                  @change-category="selectedCategory = $event"
                />
              </aside>

              <main class="panel">
                <template v-if="currentTab === 'lesson-library'">
                  <h2>Lesson Library</h2>
                  <div class="toolbar">
                    <input v-model="keyword" type="text" placeholder="Search lesson titles" />
                    <select v-model="levelFilter">
                      <option value="all">All levels</option>
                      <option value="beginner">Beginner</option>
                      <option value="intermediate">Intermediate</option>
                    </select>
                    <button @click="resetFilters">Reset Filters</button>
                  </div>

                  <div v-if="filteredLessons.length > 0" class="cards">
                    <lesson-card
                      v-for="lesson in filteredLessons"
                      :key="lesson.id"
                      :lesson="lesson"
                      @toggle="toggleLesson"
                    />
                  </div>
                  <div v-else class="empty-state">
                    No playground items match the current filters.
                  </div>
                </template>

                <template v-else-if="currentTab === 'state-preview'">
                  <h2>State Preview</h2>
                  <p>
                    This tab helps you read derived state at a glance before you wire the same
                    ideas into a larger admin dashboard.
                  </p>
                  <div class="cards">
                    <article class="lesson-card">
                      <span class="badge">Selected Category</span>
                      <h3>{{ selectedCategory }}</h3>
                    </article>
                    <article class="lesson-card">
                      <span class="badge">Level Filter</span>
                      <h3>{{ levelFilter }}</h3>
                    </article>
                    <article class="lesson-card">
                      <span class="badge">Search Keyword</span>
                      <h3>{{ keyword || "None" }}</h3>
                    </article>
                  </div>
                </template>

                <template v-else>
                  <h2>Form Studio</h2>
                  <div class="form-grid">
                    <label>
                      Component idea
                      <input v-model="form.title" type="text" placeholder="Example: Build a modal shell" />
                    </label>
                    <label>
                      Category
                      <select v-model="form.category">
                        <option value="UI">UI</option>
                        <option value="Component">Component</option>
                        <option value="State">State</option>
                        <option value="Form">Form</option>
                      </select>
                    </label>
                    <label>
                      Level
                      <select v-model="form.level">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                      </select>
                    </label>
                    <label>
                      Notes
                      <textarea v-model="form.notes" rows="5" placeholder="What should this component handle?"></textarea>
                    </label>
                  </div>

                  <div class="inline-actions">
                    <button @click="addDraftLesson">Add To Library</button>
                  </div>

                  <div class="preview">
                    <span class="badge">Live Preview</span>
                    <h3>{{ livePreview.title }}</h3>
                    <p><strong>Category:</strong> {{ livePreview.category }}</p>
                    <p><strong>Level:</strong> {{ livePreview.level }}</p>
                    <p>{{ livePreview.notes }}</p>
                  </div>
                </template>
              </main>
            </section>
          </div>
        `,
      }).mount("#app");
    </script>
  </body>
</html>
