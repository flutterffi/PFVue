<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>16 Small Todo App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
      }

      form {
        display: flex;
        gap: 12px;
      }

      input,
      button {
        padding: 10px 12px;
      }

      ul {
        padding-left: 20px;
      }

      li {
        margin: 10px 0;
      }

      .done {
        text-decoration: line-through;
        color: #68707a;
      }
    </style>
  </head>
  <body>
    <h1>Small Todo App</h1>

    <form id="todo-form">
      <input id="todo-input" type="text" placeholder="Add a study task" />
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list"></ul>

    <script src="./script.js"></script>
  </body>
</html>
